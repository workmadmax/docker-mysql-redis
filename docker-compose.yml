
version: "3.8"

services:

  # ─── Cenário A e B ───────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: mysql_cenario
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: secretaria
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # ─── Cenário B ───────────────────────────────────
  redis:
    image: redis:7.0
    container_name: redis_cenario_b
    restart: always
    ports:
      - "6379:6379"

  # ─── Cenário A ───────────────────────────────────
  qdrant:
    image: qdrant/qdrant
    container_name: qdrant_cenario_a
    restart: always
    ports:
      - "6333:6333"

  # ─── Cenário C ───────────────────────────────────
  minio:
    image: minio/minio
    container_name: minio_cenario_c
    restart: always
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  mysql_data:
  minio_data: