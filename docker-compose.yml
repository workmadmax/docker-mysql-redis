
version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: mysql_cenario_b
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: secretaria
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.0
    container_name: redis_cenario_b
    restart: always
    ports:
      - "6379:6379"

volumes:
  mysql_data: